<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GeoGuess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.css" />
<link rel="stylesheet" href="style.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.js"></script>
</head>
<body>

<div id="screen-loading" class="screen active">
  <div class="loader-box">
    <div class="spinner"></div>
    <div class="loader-text">Loading…</div>
  </div>
</div>

<div id="screen-menu" class="screen">
  <div class="menu-bg"></div>
  <div class="menu-card">
    <h1 class="logo">GeoGuess</h1>
    <p class="tagline">Drop into a random spot on Earth. Guess where you are.</p>
    <button class="btn primary big" id="btn-single">
      <span class="btn-icon">🌍</span>
      <span>Single Player</span>
    </button>
    <div class="divider"><span>or play with friends</span></div>
    <input id="player-name" placeholder="Your name" maxlength="16" />
    <button class="btn" id="btn-mp-create">
      <span class="btn-icon">🎮</span>
      <span>Create Room</span>
    </button>
    <div class="join-row">
      <input id="join-code" placeholder="ROOM CODE" maxlength="6" />
      <button class="btn" id="btn-mp-join">Join</button>
    </div>
  </div>
  <div class="menu-footer">Powered by Mapillary · Made with ♥</div>
</div>

<div id="screen-lobby" class="screen">
  <div class="menu-card">
    <h2>Lobby</h2>
    <div class="room-code-display">
      <span class="room-label">Room Code</span>
      <span id="lobby-code"></span>
      <button class="btn ghost small" id="btn-copy-code" title="Copy code">📋</button>
    </div>
    <ul id="lobby-players"></ul>
    <button class="btn primary" id="btn-lobby-start">Start Game</button>
    <button class="btn ghost" id="btn-lobby-leave">Leave</button>
    <div class="hint" id="lobby-hint"></div>
  </div>
</div>

<div id="screen-game" class="screen">
  <div id="streetview"></div>

  <div id="hud-top">
    <div class="hud-card">
      <span class="hud-emoji">⚐</span>
      <div class="hud-stack">
        <span class="hud-label">Round</span>
        <span class="hud-value" id="hud-round">1/5</span>
      </div>
    </div>
    <div class="hud-card">
      <span class="hud-emoji">★</span>
      <div class="hud-stack">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="hud-score">0</span>
      </div>
    </div>
    <div class="hud-card hud-timer-card">
      <svg class="timer-ring" width="46" height="46" viewBox="0 0 46 46">
        <circle class="timer-ring-bg" cx="23" cy="23" r="20"/>
        <circle class="timer-ring-fg" cx="23" cy="23" r="20" id="timer-ring-fg"/>
      </svg>
      <span class="hud-timer-text" id="hud-timer">60</span>
    </div>
  </div>

  <button class="btn-icon top-right" id="btn-quit" title="Quit">✕</button>

  <div id="pano-controls">
    <button class="btn-pano" id="btn-reset-pos" title="Return to start">⟲</button>
    <div id="compass" title="Compass — pan to rotate">
      <div id="compass-needle">
        <div class="needle-north"></div>
        <div class="needle-south"></div>
      </div>
      <div class="compass-label-n">N</div>
    </div>
  </div>

  <div id="mp-players-strip"></div>

  <div id="guess-map-container">
    <button class="map-toggle" id="map-toggle" aria-label="toggle map">⌄</button>
    <div id="guess-map"></div>
    <button class="btn-guess" id="btn-guess" disabled>
      <span>MAKE GUESS</span>
    </button>
  </div>
</div>

<div id="screen-round-result" class="screen">
  <div id="result-map"></div>
  <div class="result-panel">
    <h2 id="result-title">Round 1</h2>
    <div class="big-stat"><span id="result-score">0</span> <span class="unit">pts</span></div>
    <div class="medium-stat"><span id="result-distance">0 km</span> off</div>
    <div id="result-mp-list"></div>
    <button class="btn primary" id="btn-next">Next Round →</button>
  </div>
</div>

<div id="screen-final" class="screen">
  <div id="final-map"></div>
  <div class="result-panel wide">
    <h2>Final Score</h2>
    <div class="big-stat"><span id="final-score">0</span> <span class="unit">pts</span></div>
    <div id="final-mp-leaderboard"></div>
    <ul id="final-rounds"></ul>
    <div class="final-actions">
      <button class="btn primary" id="btn-play-again">Play Again</button>
      <button class="btn" id="btn-share">Copy Results</button>
      <button class="btn ghost" id="btn-home">Main Menu</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
